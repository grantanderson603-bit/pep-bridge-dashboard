<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEP Bridge Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e2e8f0;
      width: 320px;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: #1a2840;
      border: 1px solid #2d3f5e;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle {
      width: 36px; height: 20px;
      background: #2d3f5e;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on { background: #2563eb; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 18px; }
    button {
      width: 100%;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      padding: 9px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    button:hover { background: #1d4ed8; }
    .status {
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      color: #22c55e;
      min-height: 16px;
    }
    .divider { border: none; border-top: 1px solid #1e3048; margin: 12px 0; }
    .hint { font-size: 10px; color: #475569; margin-top: 4px; word-break: break-all; }
  </style>
</head>
<body>
  <h2><span class="dot" id="statusDot"></span> PEP Bridge</h2>

  <div class="field">
    <label>Backend Server URL (Webhook)</label>
    <input type="text" id="webhookUrl" placeholder="https://your-app.up.railway.app/api/pep-sync" />
    <div class="hint" id="urlHint"></div>
  </div>

  <div class="field">
    <label>Poll Interval (seconds)</label>
    <input type="number" id="pollInterval" min="10" max="3600" value="60" />
  </div>

  <div class="toggle-row">
    <label style="margin:0">Bridge Enabled</label>
    <div class="toggle on" id="enabledToggle"></div>
  </div>

  <hr class="divider" />
  <button id="saveBtn">Save Settings</button>
  <div class="status" id="statusMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
